name: CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'task2/test.txt'

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/fastapi-app

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:  staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------
      # Setup Python
      # -----------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # -----------------------
      # Install Dependencies
      # -----------------------
      - name: Install dependencies
        run: pip install -r task2/requirements.txt

      # -----------------------
      # Lint
      # -----------------------
      - name: Lint
        run: |
          pip install flake8
          flake8 task2/app

      # -----------------------
      # Run Tests
      # -----------------------
      - name: Run tests
        run: |
          export PYTHONPATH=$PWD/task2
          pytest task2/tests

      # -----------------------
      # Docker Login
      # -----------------------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------
      # Build Docker Image
      # -----------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} task2

      # -----------------------
      # Push Docker Image
      # -----------------------
      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ github.sha }}

      # --------------------
      # Install Kustomize
      # --------------------
      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      # --------------------
      # Update Image Tag in Staging Overlay
      # --------------------
      - name: Update image tag in Kustomize
        run: |
          cd task2/k8s/overlays/staging
          kustomize edit set image $IMAGE_NAME=$IMAGE_NAME:${{ github.sha }}

      # --------------------
      # Commit & Push GitOps Change
      # --------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add task2/k8s/overlays/staging/kustomization.yaml
          git commit -m "Update image to $IMAGE_NAME:${{ github.sha }}" || echo "No changes to commit"
          git push
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production 

    steps:
      - uses: actions/checkout@v4

      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
          
      - name: Pull latest changes
        run: |
          git pull origin main --rebase

      - name: Update production overlay
        run: |
          cd task2/k8s/overlays/production
          kustomize edit set image $IMAGE_NAME=$IMAGE_NAME:${{ github.sha }}


      - name: Commit production change
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add task2/k8s/overlays/production/kustomization.yaml
          git commit -m "Promote to production: $IMAGE_NAME:${{ github.sha }}"
          git push
