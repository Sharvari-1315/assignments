name: CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'task2/test.txt'

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/fastapi-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task2
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # --------------------
    # Python Setup
    # --------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # --------------------
    # Linting
    # --------------------
    - name: Run flake8
      run: |
        pip install flake8
        flake8 app

    # --------------------
    # Tests
    # --------------------
    - name: Run tests
      run: |
        pip install pytest httpx
        pytest

    # --------------------
    # Docker Login
    # --------------------
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # --------------------
    # Build & Push Image
    # --------------------
    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .
    
    - name: Push Docker Image
      run: |
        docker push $IMAGE_NAME:${{ github.sha }}

    # --------------------
    # Install Kustomize
    # --------------------
    - name: Install Kustomize
      run: |
        curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
        sudo mv kustomize /usr/local/bin/

    # --------------------
    # Update Image Tag in Staging Overlay
    # --------------------
    - name: Update image tag in Kustomize
      run: |
        cd k8s/overlays/staging
        kustomize edit set image sharu/fastapi-app=$IMAGE_NAME:${{ github.sha }}

    # --------------------
    # Commit & Push GitOps Change
    # --------------------
    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/overlays/staging/kustomization.yaml
        git commit -m "Update image to $IMAGE_NAME:${{ github.sha }}"
        git push
