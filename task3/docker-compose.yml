version: "3.8"

services:
  prometheus:
    network_mode: host
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - /home/ubuntu/assignments/task3/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/ubuntu/assignments/task3/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    network_mode: "host"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
  loki:
    image: grafana/loki:latest
    container_name: loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - /home/ubuntu/assignments/task3/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    network_mode: host
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
volumes:
  prometheus_data:
  loki_data:
  grafana_data:
