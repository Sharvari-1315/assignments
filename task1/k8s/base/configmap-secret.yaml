---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dodo-app
data:
  APP_VERSION: "1.0.0"
  ALLOWED_ORIGINS: "http://frontend-service.dodo-app.svc.cluster.local,http://localhost:3000"
  LOG_LEVEL: "info"
---
# ─── ConfigMap: PostgreSQL init script ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: dodo-app
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS items (
      id          SERIAL PRIMARY KEY,
      name        VARCHAR(255) NOT NULL,
      description TEXT,
      created_at  TIMESTAMPTZ DEFAULT NOW()
    );
    -- Seed data
    INSERT INTO items (name, description) VALUES
      ('Welcome Item', 'This is a seed record from init script'),
      ('Dodo Demo', 'Kubernetes microservices demo')
    ON CONFLICT DO NOTHING;
---
# ─── Secret: PostgreSQL credentials ──────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: dodo-app
type: Opaque
data:
  POSTGRES_USER: ZG9kbw==
  POSTGRES_PASSWORD: ZG9kb3Bhc3M=
  POSTGRES_DB: ZG9kb19kYg==
---
# ─── Secret: Backend DATABASE_URL ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dodo-app
type: Opaque
stringData:
  DATABASE_URL: "postgresql://dodo:dodopass@postgres-service.dodo-app.svc.cluster.local:5432/dodo_db"
